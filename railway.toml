[build]
builder = "dockerfile"
buildCommand = "docker build -t rag-assistant ."

[deploy]
restartPolicyMaxRetries = 3
restartPolicyType = "ON_FAILURE"

# Note: No volumes needed! Using HuggingFace Inference API
# Models download on-demand from HF, no local storage required

[env]
PYTHONUNBUFFERED = "1"
